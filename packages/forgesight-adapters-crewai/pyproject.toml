[project]
name = "forgesight-adapters-crewai"
version = "0.1.0"
description = "ForgeSight CrewAI adapter — auto-instrument CrewAI crews via the event bus."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "kjoshi" }]
keywords = ["observability", "crewai", "ai-agents", "forgesight", "adapter"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Topic :: System :: Monitoring",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
# crewai is the user's own (heavy) framework — imported lazily, not re-pinned here; install
# it via the `crewai` extra or alongside in your environment.
dependencies = ["forgesight-core"]

[project.optional-dependencies]
crewai = ["crewai>=0.80"]

[project.entry-points."forgesight.adapters"]
crewai = "forgesight_adapters_crewai:CrewAIAdapter"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forgesight_adapters_crewai"]

[tool.uv.sources]
forgesight-core = { workspace = true }
