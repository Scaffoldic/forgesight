[project]
name = "forgesight-core"
version = "0.1.1"
description = "ForgeSight runtime — context propagation, instrumentation scopes, dispatch, default exporters."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "kjoshi" }]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Topic :: System :: Monitoring",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
# Vendor-neutral runtime: api contracts + the OTel API/SDK only (never a backend SDK, P1).
dependencies = [
    "forgesight-api",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    "pyyaml>=6.0",
]

[project.urls]
Homepage = "https://github.com/Scaffoldic/forgesight"
Repository = "https://github.com/Scaffoldic/forgesight"
Issues = "https://github.com/Scaffoldic/forgesight/issues"
Changelog = "https://github.com/Scaffoldic/forgesight/blob/main/docs/releases/v0.1.md"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forgesight_core"]

[tool.uv.sources]
forgesight-api = { workspace = true }
