[project]
name = "forgesight-adapters-langgraph"
version = "0.1.0"
description = "ForgeSight LangGraph adapter — auto-instrument LangGraph/LangChain agents via callbacks."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "kjoshi" }]
keywords = ["observability", "langgraph", "langchain", "ai-agents", "forgesight", "adapter"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = ["forgesight-core", "langchain-core>=0.3"]

[project.entry-points."forgesight.adapters"]
langgraph = "forgesight_adapters_langgraph:LangGraphAdapter"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forgesight_adapters_langgraph"]

[tool.uv.sources]
forgesight-core = { workspace = true }
