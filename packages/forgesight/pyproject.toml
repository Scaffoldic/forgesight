[project]
name = "forgesight"
version = "0.1.0"
description = "ForgeSight — vendor-neutral, OpenTelemetry-first telemetry SDK for AI agents (batteries-included facade)."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "kjoshi" }]
keywords = ["observability", "telemetry", "ai-agents", "opentelemetry", "llm", "agents"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = ["forgesight-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/forgesight"]

[tool.uv.sources]
forgesight-core = { workspace = true }
