# A local OTLP backend for the agent_otlp.py example.
#
#   docker compose up -d        # start Jaeger
#   # ... run agent_otlp.py ...
#   open http://localhost:16686 # see the trace
#   docker compose down         # stop
#
# Jaeger all-in-one accepts OTLP/HTTP on :4318 and serves its UI on :16686.
# Swap it for any OTLP collector (Grafana Tempo, an OTel Collector, etc.) — the
# agent code and the FORGESIGHT_OTLP_ENDPOINT never change.
services:
  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP / HTTP
