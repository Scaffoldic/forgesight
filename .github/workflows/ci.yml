name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy --strict)
        run: uv run mypy packages/*/src

      - name: Test + coverage (>= 90%)
        run: uv run pytest

  # Patch coverage: NEW/changed lines in a PR must be >= 90% covered, even
  # though the repo total already sits well above the floor. Catches under-
  # tested code that the existing cushion would otherwise hide.
  patch-coverage:
    name: patch-coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Test + coverage xml
        run: uv run pytest

      - name: Diff coverage (changed lines >= 90%)
        run: |
          git fetch --no-tags origin "${{ github.base_ref }}"
          uv run diff-cover coverage.xml \
            --compare-branch="origin/${{ github.base_ref }}" \
            --fail-under=90 \
            --markdown-report=patch-coverage.md

      - name: Publish patch-coverage summary
        if: always()
        run: cat patch-coverage.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

  # Secret scanning — fail the build if any credential is committed (full history, not just
  # the diff), so nothing leaks before/after the repo goes public. Runs on push + PRs.
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # scan every commit, not just the tip

      - name: gitleaks (detect secrets in history + tree)
        run: >-
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:latest
          detect --source /repo --redact --no-banner
